<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}EduTrack — Student Management{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

<!-- Sidebar -->
<div class="sidebar" id="sidebar">
    <div class="sidebar-brand">
        <div class="brand-icon"><i class="bi bi-mortarboard-fill"></i></div>
        <div class="brand-text">
            <span class="brand-name">EduTrack</span>
            <span class="brand-sub">Management System</span>
        </div>
    </div>

    <nav class="sidebar-nav">
        <a href="/" class="nav-item {% if request.url.path == '/' %}active{% endif %}">
            <i class="bi bi-grid-1x2-fill"></i>
            <span>Dashboard</span>
        </a>
        <a href="/students" class="nav-item {% if '/students' in request.url.path %}active{% endif %}">
            <i class="bi bi-people-fill"></i>
            <span>Students</span>
        </a>
        <a href="/subjects" class="nav-item {% if '/subjects' in request.url.path %}active{% endif %}">
            <i class="bi bi-journal-bookmark-fill"></i>
            <span>Subjects</span>
        </a>
        <a href="/add_student" class="nav-item {% if request.url.path == '/add_student' %}active{% endif %}">
            <i class="bi bi-person-plus-fill"></i>
            <span>Add Student</span>
        </a>
    </nav>

    <div class="sidebar-footer">
        <div class="sidebar-footer-text">Academic Year 2024–25</div>
    </div>
</div>

<!-- Main Content -->
<div class="main-wrapper">
    <!-- Top bar -->
    <header class="topbar">
        <button class="sidebar-toggle" onclick="toggleSidebar()">
            <i class="bi bi-list"></i>
        </button>
        <div class="topbar-title">{% block page_title %}Dashboard{% endblock %}</div>
        <div class="topbar-right">
            <span class="topbar-date" id="topbarDate"></span>
        </div>
    </header>

    <!-- Flash messages -->
    <div class="flash-container" id="flashContainer"></div>

    <!-- Page content -->
    <main class="page-content">
        {% block content %}{% endblock %}
    </main>
</div>

<!-- Toast notification -->
<div class="toast-wrap" id="toastWrap">
    <div class="toast-box" id="toastBox">
        <i class="bi bi-check-circle-fill" id="toastIcon"></i>
        <span id="toastMsg"></span>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="/static/js/script.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
